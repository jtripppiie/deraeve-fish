name: Apply secret alerts update

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.changes/**'
      - '.github/workflows/apply-secret-alerts.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          show-progress: false

      - name: Reconstruct and apply update
        id: apply_patch
        shell: bash
        run: |
          set -uo pipefail
          cat .changes/patch.part-* > /tmp/secret-alerts-splash.patch
          wc -c /tmp/secret-alerts-splash.patch | tee /tmp/patch-info.txt
          sha256sum /tmp/secret-alerts-splash.patch | tee -a /tmp/patch-info.txt
          git apply --check /tmp/secret-alerts-splash.patch > /tmp/apply.log 2>&1
          result=$?
          cat /tmp/apply.log
          if [ "$result" -ne 0 ]; then exit "$result"; fi
          git apply /tmp/secret-alerts-splash.patch

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-alerts-patch-diagnostics
          path: |
            /tmp/secret-alerts-splash.patch
            /tmp/patch-info.txt
            /tmp/apply.log
          if-no-files-found: warn
          retention-days: 2

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Run unit tests
        run: gradle --no-daemon --stacktrace testDebugUnitTest

      - name: Assemble debug APK
        run: gradle --no-daemon --stacktrace assembleDebug

      - name: Commit updated Android source
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'DeRaeve update bot'
          git config user.email 'actions@users.noreply.github.com'
          git add README.md app/build.gradle.kts \
            app/src/main/java/com/tripperdee/deraevfish/MainActivity.java \
            app/src/main/java/com/tripperdee/deraevfish/NotificationHelper.java \
            app/src/main/java/com/tripperdee/deraevfish/SettingsActivity.java
          git commit -m 'Polish splash and add secret test alerts'
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Upload verified APK
        uses: actions/upload-artifact@v4
        with:
          name: deraev-secret-alerts-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
