name: Apply secret alerts update

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.changes/**'
      - '.github/workflows/apply-secret-alerts.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          show-progress: false

      - name: Reconstruct and apply Android update
        shell: bash
        run: |
          set -euxo pipefail
          cat .changes/patch.part-* > /tmp/secret-alerts-splash.patch
          git apply --check --exclude=README.md /tmp/secret-alerts-splash.patch
          git apply --exclude=README.md /tmp/secret-alerts-splash.patch

      - name: Add network hostname fallback
        shell: python
        run: |
          from pathlib import Path

          path = Path('app/src/main/java/com/tripperdee/deraevfish/FishRepository.java')
          text = path.read_text()
          text = text.replace(
              'private static final String TAG = "DeRaeveSync";',
              'private static final String TAG = "DeRaeveSync";\n'
              '    private static final String PRIMARY_HOST = "www.adfg.alaska.gov";\n'
              '    private static final String FALLBACK_HOST = "adfg.alaska.gov";'
          )
          text = text.replace(
              'Uri uri = Uri.parse("https://www.adfg.alaska.gov/sf/FishCounts/index.cfm").buildUpon()',
              'Uri uri = Uri.parse("https://" + PRIMARY_HOST + "/sf/FishCounts/index.cfm").buildUpon()'
          )
          old = '''    private FetchResponse request(String urlString, String etag, String lastModified) throws Exception {
        HttpURLConnection connection = (HttpURLConnection) new URL(urlString).openConnection();
        connection.setConnectTimeout(20_000);
        connection.setReadTimeout(25_000);
        connection.setInstanceFollowRedirects(true);
        connection.setRequestProperty("Accept", "application/json,text/html;q=0.8");
        connection.setRequestProperty("User-Agent", "DeRaeveFishCount/0.2 Android (unofficial ADF&G client)");
        if (etag != null && !etag.isBlank()) connection.setRequestProperty("If-None-Match", etag);
        if (lastModified != null && !lastModified.isBlank()) connection.setRequestProperty("If-Modified-Since", lastModified);
        int status = connection.getResponseCode();
        if (status == HttpURLConnection.HTTP_NOT_MODIFIED) {
            return new FetchResponse("", true, etag, lastModified);
        }
        if (status < 200 || status >= 300) throw new NetworkFailure("HTTP " + status);
        String body;
        try (InputStream input = connection.getInputStream()) {
            body = readAll(input);
        }
        if (body.length() < 2) throw new NetworkFailure("Empty response");
        return new FetchResponse(body, false,
                connection.getHeaderField("ETag"), connection.getHeaderField("Last-Modified"));
    }'''
          new = '''    private FetchResponse request(String urlString, String etag, String lastModified) throws Exception {
        try {
            return requestOnce(urlString, etag, lastModified);
        } catch (java.net.UnknownHostException first) {
            String fallback = urlString.replace("https://" + PRIMARY_HOST, "https://" + FALLBACK_HOST);
            if (fallback.equals(urlString)) throw first;
            try {
                return requestOnce(fallback, etag, lastModified);
            } catch (java.net.UnknownHostException second) {
                throw new NetworkFailure("Could not reach ADF&G. Check your connection and try again; saved counts were preserved.");
            }
        }
    }

    private FetchResponse requestOnce(String urlString, String etag, String lastModified) throws Exception {
        HttpURLConnection connection = (HttpURLConnection) new URL(urlString).openConnection();
        connection.setConnectTimeout(20_000);
        connection.setReadTimeout(25_000);
        connection.setInstanceFollowRedirects(true);
        connection.setRequestProperty("Accept", "application/json,text/html;q=0.8");
        connection.setRequestProperty("User-Agent", "DeRaeveFishCount/0.3 Android (unofficial ADF&G client)");
        if (etag != null && !etag.isBlank()) connection.setRequestProperty("If-None-Match", etag);
        if (lastModified != null && !lastModified.isBlank()) connection.setRequestProperty("If-Modified-Since", lastModified);
        try {
            int status = connection.getResponseCode();
            if (status == HttpURLConnection.HTTP_NOT_MODIFIED) {
                return new FetchResponse("", true, etag, lastModified);
            }
            if (status < 200 || status >= 300) throw new NetworkFailure("HTTP " + status);
            String body;
            try (InputStream input = connection.getInputStream()) {
                body = readAll(input);
            }
            if (body.length() < 2) throw new NetworkFailure("Empty response");
            return new FetchResponse(body, false,
                    connection.getHeaderField("ETag"), connection.getHeaderField("Last-Modified"));
        } finally {
            connection.disconnect();
        }
    }'''
          if old not in text:
              raise SystemExit('request method did not match expected source')
          text = text.replace(old, new)
          path.write_text(text)

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Run unit tests
        run: gradle --no-daemon --stacktrace testDebugUnitTest

      - name: Assemble debug APK
        run: gradle --no-daemon --stacktrace assembleDebug

      - name: Commit updated Android source
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name 'DeRaeve update bot'
          git config user.email 'actions@users.noreply.github.com'
          git add app/build.gradle.kts \
            app/src/main/java/com/tripperdee/deraevfish/MainActivity.java \
            app/src/main/java/com/tripperdee/deraevfish/FishRepository.java \
            app/src/main/java/com/tripperdee/deraevfish/NotificationHelper.java \
            app/src/main/java/com/tripperdee/deraevfish/SettingsActivity.java
          git commit -m 'Polish splash, add secret alerts, and harden ADF&G networking'
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Upload verified APK
        uses: actions/upload-artifact@v4
        with:
          name: deraev-secret-alerts-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
