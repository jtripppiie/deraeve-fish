name: Bootstrap DeRaeve Android source

on:
  push:
    paths:
      - '.github/workflows/bootstrap-source.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate-test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download and verify the previously tested source package
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/deraev-parts /tmp/deraev-unpacked
          for part in 00 01 02 03 04 05 06 07; do
            curl --fail --location --silent --show-error \
              "https://raw.githubusercontent.com/jtripppiie/android-game/deraev-fish-count-app/fish-src.part-${part}" \
              --output "/tmp/deraev-parts/fish-src.part-${part}"
          done
          cat /tmp/deraev-parts/fish-src.part-* > /tmp/deraev-source.b64
          base64 --decode /tmp/deraev-source.b64 > /tmp/deraev-source.tar.gz
          echo "9ea2bb4121785a51a44ec5d54b76795662bd923d1194e478b4191cc8aaa35cde  /tmp/deraev-source.tar.gz" | sha256sum --check
          tar -xzf /tmp/deraev-source.tar.gz -C /tmp/deraev-unpacked
          test -f /tmp/deraev-unpacked/deraev-fish-count/settings.gradle.kts
          test -f /tmp/deraev-unpacked/deraev-fish-count/app/src/main/java/com/tripperdee/deraevfish/MainActivity.java

      - name: Install the normal Android project structure
        shell: bash
        run: |
          set -euxo pipefail
          rsync -a \
            --exclude 'README.md' \
            --exclude 'ci/' \
            /tmp/deraev-unpacked/deraev-fish-count/ ./
          mkdir -p .github/workflows
          cat > .github/workflows/build-apk.yml <<'YAML'
          name: Build DeRaeve Fish Count APK

          on:
            push:
              branches: [ main ]
            pull_request:
              branches: [ main ]
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            test-and-build:
              runs-on: ubuntu-latest
              timeout-minutes: 30
              steps:
                - name: Check out repository
                  uses: actions/checkout@v4
                - name: Set up Java 17
                  uses: actions/setup-java@v4
                  with:
                    distribution: temurin
                    java-version: '17'
                - name: Set up Gradle 9.5
                  uses: gradle/actions/setup-gradle@v4
                  with:
                    gradle-version: '9.5.0'
                - name: Run unit tests
                  run: gradle --no-daemon --stacktrace testDebugUnitTest
                - name: Assemble debug APK
                  run: gradle --no-daemon --stacktrace assembleDebug
                - name: Upload APK and test reports
                  uses: actions/upload-artifact@v4
                  with:
                    name: deraev-fish-count-debug
                    path: |
                      app/build/outputs/apk/debug/app-debug.apk
                      app/build/reports/tests/testDebugUnitTest/**
                    if-no-files-found: error
                    retention-days: 14
          YAML
          cat > .gitignore <<'EOF'
          .gradle/
          .idea/
          local.properties
          **/build/
          *.iml
          .DS_Store
          EOF
          rm -rf .bootstrap

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Run unit tests from the migrated source
        run: gradle --no-daemon --stacktrace testDebugUnitTest

      - name: Assemble the migrated debug APK
        run: gradle --no-daemon --stacktrace assembleDebug

      - name: Commit the normal source tree
        shell: bash
        run: |
          set -euxo pipefail
          rm -f .github/workflows/bootstrap-source.yml
          git config user.name 'DeRaeve migration'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Move DeRaeve Fish Count into dedicated repository'
          git push origin HEAD:main

      - name: Upload verified migrated APK
        uses: actions/upload-artifact@v4
        with:
          name: deraev-fish-count-migrated-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
