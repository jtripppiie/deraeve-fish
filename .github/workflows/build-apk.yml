name: Build DeRaeve Fish Count APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Run unit tests
        run: gradle --no-daemon --stacktrace testDebugUnitTest

      - name: Assemble debug APK
        run: gradle --no-daemon --stacktrace assembleDebug

      - name: Upload APK and test reports
        uses: actions/upload-artifact@v4
        with:
          name: deraev-fish-count-debug
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/reports/tests/testDebugUnitTest/**
          if-no-files-found: error
          retention-days: 14
